- name: Setup Docker on app servers
  hosts: appservers
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker
      apt:
        name: [docker.io, docker-compose]
        state: present

    - name: Add user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
