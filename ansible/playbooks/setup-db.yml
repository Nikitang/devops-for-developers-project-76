- name: Setup PostgreSQL
  hosts: app-server-1
  become: yes

  tasks:
    - name: Run PostgreSQL container
      docker_container:
        name: postgres
        image: postgres:15-alpine
        state: started
        restart_policy: always
        env:
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
          POSTGRES_DB: app_db
        volumes:
          - postgres_/var/lib/postgresql/data
        ports:
          - "127.0.0.1:5432:5432"
